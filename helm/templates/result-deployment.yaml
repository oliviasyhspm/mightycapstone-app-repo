apiVersion: apps/v1
kind: Deployment

metadata:
  name: result
  labels:
    app: result

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: result

  template:
    metadata:
      labels:
        app: result

    spec:
      containers:
      - name: result

        image: "{{ .Values.result.image.repository }}:{{ .Values.result.image.tag }}"

        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - containerPort: 80
          name: result