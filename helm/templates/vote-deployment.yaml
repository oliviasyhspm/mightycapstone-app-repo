apiVersion: apps/v1
kind: Deployment

metadata:
  name: vote
  labels:
    app: vote

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: vote

  template:
    metadata:
      labels:
        app: vote

    spec:
      containers:
        - name: vote
          image: "{{ .Values.vote.image.repository }}:{{ .Values.vote.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 80
              name: vote