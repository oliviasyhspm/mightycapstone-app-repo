name: Build Worker Service

on:
  # workflow_dispatch:
  push:
    branches:
      - feature/madhu-sample-prod
    paths:
      - 'worker/**'
      - '.github/workflows/call-docker-build-worker-prod.yaml'
  pull_request:
    branches:
      - feature/madhu-sample-prod
    paths:
      - 'worker/**'
      - '.github/workflows/call-docker-build-worker-prod.yaml'

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare security report directory
        run: |
          mkdir -p security-reports
          chmod 777 security-reports

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Run SAST scan with Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
          semgrep scan \
            --config p/ci \
            --severity ERROR \
            --exclude result/views/angular.min.js \
            --exclude result/views/socket.io.js \
            --sarif \
            --output security-reports/semgrep-worker.sarif \
            . || true

      - name: Generate SAST HTML Report
        if: always()
        run: |
          python - <<'PY'
          import json, html, pathlib, datetime
          sarif_path = pathlib.Path("security-reports/semgrep-worker.sarif")
          html_path = pathlib.Path("security-reports/semgrep-worker.html")
          title = "SAST (Semgrep) - Worker Service"
          rows = []
          error = None
          try:
              data = json.loads(sarif_path.read_text(encoding="utf-8"))
              runs = data.get("runs", [])
              for run in runs:
                  rules = {}
                  for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                      rid = rule.get("id", "")
                      rules[rid] = rule
                  for result in run.get("results", []):
                      rid = result.get("ruleId", "")
                      rule = rules.get(rid, {})
                      level = result.get("level") or rule.get("defaultConfiguration", {}).get("level", "")
                      msg = result.get("message", {}).get("text", "")
                      loc = ""
                      locations = result.get("locations", [])
                      if locations:
                          phys = locations[0].get("physicalLocation", {})
                          uri = phys.get("artifactLocation", {}).get("uri", "")
                          region = phys.get("region", {})
                          line = region.get("startLine", "")
                          loc = f"{uri}:{line}" if line else uri
                      rows.append((level, rid, msg, loc))
          except Exception as exc:
              error = str(exc)
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          parts = [
              "<!doctype html><html><head><meta charset='utf-8'>",
              f"<title>{html.escape(title)}</title>",
              "<style>body{font-family:Arial,sans-serif;margin:24px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;vertical-align:top}th{background:#f3f4f6}.ok{color:green}.warn{color:#b45309}.err{color:#b91c1c}code{background:#f3f4f6;padding:2px 4px}</style>",
              "</head><body>",
              f"<h1>{html.escape(title)}</h1>",
              f"<p>Generated at {html.escape(now)}</p>",
              f"<p>Source SARIF file: <code>{html.escape(str(sarif_path))}</code></p>"
          ]
          if error:
              parts.append(f"<p class='err'>Could not parse SARIF report: {html.escape(error)}</p>")
          elif not rows:
              parts.append("<p class='ok'>No findings were reported.</p>")
          else:
              parts.append(f"<p class='warn'>Total findings: {len(rows)}</p>")
              parts.append("<table><tr><th>Level</th><th>Rule ID</th><th>Message</th><th>Location</th></tr>")
              for level, rid, msg, loc in rows:
                  parts.append("<tr>" + "".join(f"<td>{html.escape(str(x))}</td>" for x in (level, rid, msg, loc)) + "</tr>")
              parts.append("</table>")
          parts.append("</body></html>")
          html_path.write_text("\n".join(parts), encoding="utf-8")
          print(f"Generated {html_path}")
          PY

      - name: Publish SAST Summary
        if: always()
        run: |
          {
            echo "## SAST (Semgrep) - Worker Service"
            echo ""
            if [ -f security-reports/semgrep-worker.sarif ]; then
              echo "✅ SAST scan completed."
              echo ""
              echo "**Report artifact files:** semgrep-worker.sarif, semgrep-worker.html"
            else
              echo "❌ SAST report was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run dependency vulnerability scan with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: ./worker
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          format: sarif
          output: security-reports/trivy-fs-worker.sarif

      - name: Generate Dependency Scan HTML Report
        if: always()
        run: |
          python - <<'PY'
          import json, html, pathlib, datetime
          sarif_path = pathlib.Path("security-reports/trivy-fs-worker.sarif")
          html_path = pathlib.Path("security-reports/trivy-fs-worker.html")
          title = "SCA / Dependency Scan (Trivy FS) - Worker Service"
          rows = []
          error = None
          try:
              data = json.loads(sarif_path.read_text(encoding="utf-8"))
              runs = data.get("runs", [])
              for run in runs:
                  rules = {}
                  for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                      rid = rule.get("id", "")
                      rules[rid] = rule
                  for result in run.get("results", []):
                      rid = result.get("ruleId", "")
                      rule = rules.get(rid, {})
                      level = result.get("level") or rule.get("defaultConfiguration", {}).get("level", "")
                      msg = result.get("message", {}).get("text", "")
                      loc = ""
                      locations = result.get("locations", [])
                      if locations:
                          phys = locations[0].get("physicalLocation", {})
                          uri = phys.get("artifactLocation", {}).get("uri", "")
                          region = phys.get("region", {})
                          line = region.get("startLine", "")
                          loc = f"{uri}:{line}" if line else uri
                      rows.append((level, rid, msg, loc))
          except Exception as exc:
              error = str(exc)
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          parts = [
              "<!doctype html><html><head><meta charset='utf-8'>",
              f"<title>{html.escape(title)}</title>",
              "<style>body{font-family:Arial,sans-serif;margin:24px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;vertical-align:top}th{background:#f3f4f6}.ok{color:green}.warn{color:#b45309}.err{color:#b91c1c}code{background:#f3f4f6;padding:2px 4px}</style>",
              "</head><body>",
              f"<h1>{html.escape(title)}</h1>",
              f"<p>Generated at {html.escape(now)}</p>",
              f"<p>Source SARIF file: <code>{html.escape(str(sarif_path))}</code></p>"
          ]
          if error:
              parts.append(f"<p class='err'>Could not parse SARIF report: {html.escape(error)}</p>")
          elif not rows:
              parts.append("<p class='ok'>No findings were reported.</p>")
          else:
              parts.append(f"<p class='warn'>Total findings: {len(rows)}</p>")
              parts.append("<table><tr><th>Level</th><th>Rule ID</th><th>Message</th><th>Location</th></tr>")
              for level, rid, msg, loc in rows:
                  parts.append("<tr>" + "".join(f"<td>{html.escape(str(x))}</td>" for x in (level, rid, msg, loc)) + "</tr>")
              parts.append("</table>")
          parts.append("</body></html>")
          html_path.write_text("\n".join(parts), encoding="utf-8")
          print(f"Generated {html_path}")
          PY

      - name: Publish Dependency Scan Summary
        if: always()
        run: |
          {
            echo "## SCA / Dependency Vulnerability Scan (Trivy FS) - Worker Service"
            echo ""
            if [ -f security-reports/trivy-fs-worker.sarif ]; then
              echo "✅ Dependency vulnerability scan completed."
              echo ""
              echo "**Report artifact files:** trivy-fs-worker.sarif, trivy-fs-worker.html"
            else
              echo "❌ Dependency scan report was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run secret scan with Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.2
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --report-format json \
            --report-path security-reports/gitleaks-worker.json \
            --exit-code 0

      - name: Generate Secret Scan HTML Report
        if: always()
        run: |
          python - <<'PY'
          import json, html, pathlib, datetime
          json_path = pathlib.Path("security-reports/gitleaks-worker.json")
          html_path = pathlib.Path("security-reports/gitleaks-worker.html")
          title = "Secret Scan (Gitleaks) - Worker Service"
          findings = []
          error = None
          try:
              text = json_path.read_text(encoding="utf-8").strip()
              data = json.loads(text) if text else []
              if isinstance(data, list):
                  findings = data
              elif isinstance(data, dict):
                  findings = data.get("findings") or data.get("results") or []
          except Exception as exc:
              error = str(exc)
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          parts = [
              "<!doctype html><html><head><meta charset='utf-8'>",
              f"<title>{html.escape(title)}</title>",
              "<style>body{font-family:Arial,sans-serif;margin:24px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;vertical-align:top}th{background:#f3f4f6}.ok{color:green}.warn{color:#b45309}.err{color:#b91c1c}code{background:#f3f4f6;padding:2px 4px}</style>",
              "</head><body>",
              f"<h1>{html.escape(title)}</h1>",
              f"<p>Generated at {html.escape(now)}</p>",
              f"<p>Source JSON file: <code>{html.escape(str(json_path))}</code></p>"
          ]
          if error:
              parts.append(f"<p class='err'>Could not parse Gitleaks report: {html.escape(error)}</p>")
          elif not findings:
              parts.append("<p class='ok'>No secrets were reported.</p>")
          else:
              parts.append(f"<p class='warn'>Total findings: {len(findings)}</p>")
              parts.append("<table><tr><th>Rule</th><th>Description</th><th>File</th><th>Line</th><th>Commit</th></tr>")
              for item in findings:
                  rule = item.get("RuleID") or item.get("rule") or ""
                  desc = item.get("Description") or item.get("description") or ""
                  file = item.get("File") or item.get("file") or ""
                  line = item.get("StartLine") or item.get("line") or ""
                  commit = item.get("Commit") or item.get("commit") or ""
                  parts.append("<tr>" + "".join(f"<td>{html.escape(str(x))}</td>" for x in (rule, desc, file, line, commit)) + "</tr>")
              parts.append("</table>")
          parts.append("</body></html>")
          html_path.write_text("\n".join(parts), encoding="utf-8")
          print(f"Generated {html_path}")
          PY

      - name: Publish Secret Scan Summary
        if: always()
        run: |
          {
            echo "## Secret Scan (Gitleaks) - Worker Service"
            echo ""
            if [ -f security-reports/gitleaks-worker.json ]; then
              echo "✅ Secret scan completed."
              echo ""
              echo "**Report artifact files:** gitleaks-worker.json, gitleaks-worker.html"
            else
              echo "❌ Secret scan report was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set version tag
        run: |
          if [[ "$$GITHUB_REF_NAME" == "feature/madhu-sample-prod" ]]; then
            echo "TAG=v2" >> $GITHUB_ENV
          else
            echo "TAG=v1" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}/bq-eks-repo-prod
          docker build -t worker-service:${TAG} -t $REGISTRY:worker-${TAG} ./worker

      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: worker-service:${{ env.TAG }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          format: sarif
          output: security-reports/trivy-image-worker.sarif

      - name: Generate Container Image Scan HTML Report
        if: always()
        run: |
          python - <<'PY'
          import json, html, pathlib, datetime
          sarif_path = pathlib.Path("security-reports/trivy-image-worker.sarif")
          html_path = pathlib.Path("security-reports/trivy-image-worker.html")
          title = "Container Image Scan (Trivy Image) - Worker Service"
          rows = []
          error = None
          try:
              data = json.loads(sarif_path.read_text(encoding="utf-8"))
              runs = data.get("runs", [])
              for run in runs:
                  rules = {}
                  for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                      rid = rule.get("id", "")
                      rules[rid] = rule
                  for result in run.get("results", []):
                      rid = result.get("ruleId", "")
                      rule = rules.get(rid, {})
                      level = result.get("level") or rule.get("defaultConfiguration", {}).get("level", "")
                      msg = result.get("message", {}).get("text", "")
                      loc = ""
                      locations = result.get("locations", [])
                      if locations:
                          phys = locations[0].get("physicalLocation", {})
                          uri = phys.get("artifactLocation", {}).get("uri", "")
                          region = phys.get("region", {})
                          line = region.get("startLine", "")
                          loc = f"{uri}:{line}" if line else uri
                      rows.append((level, rid, msg, loc))
          except Exception as exc:
              error = str(exc)
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          parts = [
              "<!doctype html><html><head><meta charset='utf-8'>",
              f"<title>{html.escape(title)}</title>",
              "<style>body{font-family:Arial,sans-serif;margin:24px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;vertical-align:top}th{background:#f3f4f6}.ok{color:green}.warn{color:#b45309}.err{color:#b91c1c}code{background:#f3f4f6;padding:2px 4px}</style>",
              "</head><body>",
              f"<h1>{html.escape(title)}</h1>",
              f"<p>Generated at {html.escape(now)}</p>",
              f"<p>Source SARIF file: <code>{html.escape(str(sarif_path))}</code></p>"
          ]
          if error:
              parts.append(f"<p class='err'>Could not parse SARIF report: {html.escape(error)}</p>")
          elif not rows:
              parts.append("<p class='ok'>No findings were reported.</p>")
          else:
              parts.append(f"<p class='warn'>Total findings: {len(rows)}</p>")
              parts.append("<table><tr><th>Level</th><th>Rule ID</th><th>Message</th><th>Location</th></tr>")
              for level, rid, msg, loc in rows:
                  parts.append("<tr>" + "".join(f"<td>{html.escape(str(x))}</td>" for x in (level, rid, msg, loc)) + "</tr>")
              parts.append("</table>")
          parts.append("</body></html>")
          html_path.write_text("\n".join(parts), encoding="utf-8")
          print(f"Generated {html_path}")
          PY

      - name: Publish Container Image Scan Summary
        if: always()
        run: |
          {
            echo "## Container Image Scan (Trivy Image) - Worker Service"
            echo ""
            if [ -f security-reports/trivy-image-worker.sarif ]; then
              echo "✅ Container image scan completed."
              echo ""
              echo "**Report artifact files:** trivy-image-worker.sarif, trivy-image-worker.html"
            else
              echo "❌ Container image scan report was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: DAST note for worker service
        run: |
          echo "Worker is a background service without an HTTP endpoint, so OWASP ZAP DAST is not applicable to this service."
          echo "DAST is implemented for the vote and result web services."

      - name: Publish DAST Summary
        if: always()
        run: |
          {
            echo "## DAST (OWASP ZAP) - Worker Service"
            echo ""
            echo "ℹ️ DAST is not applicable because the worker is a background service without an HTTP endpoint."
            echo ""
            echo "DAST is implemented for the vote and result web services."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Consolidated Security Summary
        if: always()
        run: |
          {
            echo "# DevSecOps Security Reports - Worker Service"
            echo ""
            echo "| Security Control | Report File |"
            echo "|---|---|"
            echo "| SAST (Semgrep) | semgrep-worker.sarif, semgrep-worker.html |"
            echo "| SCA / Dependency Scan (Trivy FS) | trivy-fs-worker.sarif, trivy-fs-worker.html |"
            echo "| Secret Scan (Gitleaks) | gitleaks-worker.json, gitleaks-worker.html |"
            echo "| Container Image Scan (Trivy Image) | trivy-image-worker.sarif, trivy-image-worker.html |"
            echo "| DAST (OWASP ZAP) | Not applicable - background service |"
            echo ""
            echo "Human-readable HTML reports and machine-readable SARIF/JSON reports are uploaded as the **security-reports-worker** workflow artifact."
            echo ""
            echo "## Files generated"
            echo ""
            ls -lah security-reports || true
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-worker
          path: security-reports/
          if-no-files-found: warn

      - name: Push image to ECR
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}/bq-eks-repo-prod
          docker push $REGISTRY:worker-${TAG}
      
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ap-southeast-1 \
            --name bq-eks-cluster-prod
      
      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: |
          helm lint ./helm

      - name: Deploy with Helm
        run: |
          helm upgrade --install mightycapstone ./helm \
              --set worker.image.repository=${{ steps.login-ecr.outputs.registry }}/bq-eks-repo-prod \
              --set worker.image.tag=worker-${TAG}

      - name: Verify deployment
        run: |
         kubectl rollout status deployment/result --namespace default --timeout=120s