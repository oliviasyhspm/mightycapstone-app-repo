name: Build Vote Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - development
    paths:
      - 'vote/**'
      - '.github/workflows/call-docker-build-vote.yaml'
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'vote/**'
      - '.github/workflows/call-docker-build-vote.yaml'

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SAST scan with Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
          semgrep scan \
            --config p/ci \
            --severity ERROR \
            --error \
            --exclude result/views/angular.min.js \
            --exclude result/views/socket.io.js \
            .

      - name: Run dependency vulnerability scan with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: ./vote
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Run secret scan with Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.2
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks detect --source . --redact --verbose --exit-code 1

      - name: Set version tag
        run: |
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "TAG=v2" >> $GITHUB_ENV
          else
            echo "TAG=v1" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: |
          docker build -t mightycapstonevoting:vote-${TAG} ./vote

      - name: Run container image scan with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: mightycapstonevoting:vote-${{ env.TAG }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Run DAST scan with OWASP ZAP
        run: |
          docker network create vote-dast-net
          docker run -d --name redis --network vote-dast-net redis:7-alpine
          docker run -d --name vote-dast --network vote-dast-net -p 8080:80 mightycapstonevoting:vote-${TAG}
          sleep 20
          curl --fail --retry 10 --retry-delay 5 http://localhost:8080/
          mkdir -p zap-reports
          docker run --rm --network host \
            -v "${PWD}/zap-reports:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8080 -I -r vote-zap-report.html

      - name: Upload DAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vote-zap-report
          path: zap-reports/vote-zap-report.html
          if-no-files-found: ignore

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${ secrets.AWS_ACCESS_KEY_ID }
          aws-secret-access-key: ${ secrets.AWS_SECRET_ACCESS_KEY }
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image for ECR
        if: github.event_name != 'pull_request'
        run: |
          REGISTRY=${ steps.login-ecr.outputs.registry }/mightycapstonevoting
          docker tag mightycapstonevoting:vote-${TAG} $REGISTRY:vote-${TAG}

      - name: Push image to ECR
        if: github.event_name != 'pull_request'
        run: |
          REGISTRY=${ steps.login-ecr.outputs.registry }/mightycapstonevoting
          docker push $REGISTRY:vote-${TAG}
