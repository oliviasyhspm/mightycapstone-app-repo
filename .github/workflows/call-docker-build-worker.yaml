name: Build Worker Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - development
    paths:
      - 'worker/**'
      - '.github/workflows/call-docker-build-worker.yaml'
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'worker/**'
      - '.github/workflows/call-docker-build-worker.yaml'

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SAST scan with Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
          semgrep scan \
            --config p/ci \
            --severity ERROR \
            --error \
            --exclude result/views/angular.min.js \
            --exclude result/views/socket.io.js \
            .

      - name: Run dependency vulnerability scan with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: ./worker
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Run secret scan with Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.2
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks detect --source . --redact --verbose --exit-code 1

      - name: Set version tag
        run: |
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "TAG=v2" >> $GITHUB_ENV
          else
            echo "TAG=v1" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: |
          docker build -t mightycapstonevoting:worker-${TAG} ./worker

      - name: Run container image scan with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: mightycapstonevoting:worker-${{ env.TAG }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: DAST note for worker service
        run: |
          echo "Worker is a background service without an HTTP endpoint, so OWASP ZAP DAST is not applicable to this service."
          echo "DAST is implemented for the vote and result web services."
          
      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name:   Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${ secrets.AWS_ACCESS_KEY_ID }
          aws-secret-access-key: ${ secrets.AWS_SECRET_ACCESS_KEY }
          aws-region: ap-southeast-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image for ECR
        if: github.event_name != 'pull_request'
        run: |
          REGISTRY=${ steps.login-ecr.outputs.registry }/mightycapstonevoting
          docker tag mightycapstonevoting:worker-${TAG} $REGISTRY:worker-${TAG}

      - name: Push image to ECR
        if: github.event_name != 'pull_request'
        run: |
          REGISTRY=${ steps.login-ecr.outputs.registry }/mightycapstonevoting
          docker push $REGISTRY:worker-${TAG}
