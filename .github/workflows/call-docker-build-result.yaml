name: Build Result Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - development
    paths:
      - 'result/**'
      - '.github/workflows/call-docker-build-result.yaml'
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'result/**'
      - '.github/workflows/call-docker-build-result.yaml'

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set version tag
        run: |
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "TAG=v2" >> $GITHUB_ENV
          else
            echo "TAG=v1" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}/mightycapstonevoting
          docker build -t $REGISTRY:result-${TAG} ./result

      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: ${{ steps.login-ecr.outputs.registry }}/mightycapstonevoting:result-${{ env.TAG }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push image to ECR
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}/mightycapstonevoting
          docker push $REGISTRY:result-${TAG}
