apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  namespace: mightycapstone
  labels:
    app: worker
  name: {{ .Release.Name }}-worker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: 255945442255.dkr.ecr.ap-southeast-1.amazonaws.com/mightycapstonevoting:worker-v2
        env:
        - name: REDIS_HOST
          value: redis-service
        - name: DB_HOST
          value: db-service


      - image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
        name: worker
