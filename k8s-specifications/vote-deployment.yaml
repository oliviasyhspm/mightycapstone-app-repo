apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-deployment
  namespace: mightycapstone
  labels:
    app: vote
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - name: vote
        image: 255945442255.dkr.ecr.ap-southeast-1.amazonaws.com/mightycapstonevoting:vote-v2
        ports:
        - containerPort: 80
          name: http
        env:
        - name: REDIS_HOST
          value: redis-service
        - name: DB_HOST
          value: db-service
